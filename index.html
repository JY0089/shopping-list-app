<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 1.8rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
      padding: 0 2px;
    }

    .stats .done {
      color: #48bb78;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f4f8;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    /* 커스텀 체크박스 */
    .checkbox {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      font-size: 14px;
    }

    li.checked .checkbox {
      background: #48bb78;
      border-color: #48bb78;
      color: #fff;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      cursor: pointer;
      user-select: none;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .empty .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #fc8181;
      color: #fc8181;
      background: #fff5f5;
    }

    .clear-btn:disabled {
      opacity: 0.4;
      cursor: default;
      border-color: #e2e8f0;
      color: #a0aec0;
      background: none;
    }

    .status-bar {
      font-size: 0.8rem;
      color: #a0aec0;
      text-align: right;
      margin-bottom: 8px;
      min-height: 1.2em;
    }

    .status-bar.error {
      color: #fc8181;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템 입력..." autocomplete="off" />
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div class="stats">
      <span>총 <strong id="totalCount">0</strong>개</span>
      <span class="done">완료 <strong id="doneCount">0</strong>개</span>
    </div>

    <div id="statusBar" class="status-bar"></div>

    <ul id="list"></ul>

    <div id="emptyMsg" class="empty">
      <div class="empty-icon">🛍️</div>
      <div>아직 아이템이 없어요.<br>위에서 추가해 보세요!</div>
    </div>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" disabled>
      완료 항목 삭제
    </button>
  </div>

  <script type="module">
    const SUPABASE_URL = 'https://kpsdmslrfczumbixrmkl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtwc2Rtc2xyZmN6dW1iaXhybWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MjEwNDksImV4cCI6MjA4NzI5NzA0OX0.ppLreNPUABpPALdt-ycGT8N2hVpSF7PRR3tWik9JAK0';

    const headers = {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
    };

    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('itemInput');
    const emptyMsg = document.getElementById('emptyMsg');
    const totalCount = document.getElementById('totalCount');
    const doneCount = document.getElementById('doneCount');
    const clearBtn = document.getElementById('clearBtn');
    const addBtn = document.getElementById('addBtn');
    const statusBar = document.getElementById('statusBar');

    let items = [];

    function setStatus(msg, isError = false) {
      statusBar.textContent = msg;
      statusBar.className = 'status-bar' + (isError ? ' error' : '');
    }

    async function fetchItems() {
      setStatus('불러오는 중...');
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/shopping_items?select=*&order=created_at.asc`,
        { headers }
      );
      if (!res.ok) {
        setStatus('데이터 불러오기 실패', true);
        return;
      }
      items = await res.json();
      setStatus('');
      render();
    }

    function render() {
      listEl.innerHTML = '';
      items.forEach((item) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkbox = document.createElement('div');
        checkbox.className = 'checkbox';
        checkbox.textContent = item.checked ? '✓' : '';
        checkbox.onclick = () => toggleItem(item);

        const text = document.createElement('span');
        text.className = 'item-text';
        text.textContent = item.name;
        text.onclick = () => toggleItem(item);

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.onclick = () => deleteItem(item.id);

        li.append(checkbox, text, del);
        listEl.appendChild(li);
      });

      const total = items.length;
      const done = items.filter(it => it.checked).length;
      totalCount.textContent = total;
      doneCount.textContent = done;
      emptyMsg.style.display = total === 0 ? 'block' : 'none';
      clearBtn.disabled = done === 0;
    }

    async function addItem() {
      const name = inputEl.value.trim();
      if (!name) return;

      addBtn.disabled = true;
      setStatus('추가 중...');

      const res = await fetch(`${SUPABASE_URL}/rest/v1/shopping_items`, {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'return=representation' },
        body: JSON.stringify({ name, checked: false }),
      });

      if (!res.ok) {
        setStatus('추가 실패', true);
        addBtn.disabled = false;
        return;
      }

      const [newItem] = await res.json();
      items.push(newItem);
      inputEl.value = '';
      setStatus('');
      render();
      inputEl.focus();
      addBtn.disabled = false;
    }

    async function toggleItem(item) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/shopping_items?id=eq.${item.id}`,
        {
          method: 'PATCH',
          headers: { ...headers, 'Prefer': 'return=representation' },
          body: JSON.stringify({ checked: !item.checked }),
        }
      );

      if (!res.ok) {
        setStatus('업데이트 실패', true);
        return;
      }

      const [updated] = await res.json();
      const idx = items.findIndex(i => i.id === item.id);
      if (idx !== -1) items[idx] = updated;
      render();
    }

    async function deleteItem(id) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/shopping_items?id=eq.${id}`,
        { method: 'DELETE', headers }
      );

      if (!res.ok) {
        setStatus('삭제 실패', true);
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => `"${i.id}"`).join(',');
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/shopping_items?id=in.(${checkedIds})`,
        { method: 'DELETE', headers }
      );

      if (!res.ok) {
        setStatus('삭제 실패', true);
        return;
      }

      items = items.filter(i => !i.checked);
      render();
    }

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    // 전역으로 노출 (onclick 속성에서 사용)
    window.addItem = addItem;
    window.clearChecked = clearChecked;

    fetchItems();
  </script>
</body>
</html>
