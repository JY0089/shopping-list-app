<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>앱 목록</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 16px;
    }

    .wrapper {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #718096;
      text-align: center;
      margin-bottom: 28px;
      letter-spacing: 0.05em;
    }

    .app-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .app-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 24px 28px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .app-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .app-icon {
      font-size: 2.6rem;
      flex-shrink: 0;
    }

    .app-info {
      flex: 1;
    }

    .app-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 4px;
    }

    .app-desc {
      font-size: 0.85rem;
      color: #718096;
    }

    .app-arrow {
      font-size: 1.2rem;
      color: #cbd5e0;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>앱 선택</h1>
    <div class="app-grid">
      <a class="app-card" href="flashcard.html">
        <div class="app-icon">🃏</div>
        <div class="app-info">
          <div class="app-name">암기카드</div>
          <div class="app-desc">덱을 만들고 카드로 학습해요</div>
        </div>
        <div class="app-arrow">›</div>
      </a>
      <a class="app-card" href="shopping-list.html">
        <div class="app-icon">🛒</div>
        <div class="app-info">
          <div class="app-name">쇼핑 리스트</div>
          <div class="app-desc">장볼 항목을 기록하고 체크해요</div>
        </div>
        <div class="app-arrow">›</div>
      </a>
    </div>
  </div>
</body>
</html>
